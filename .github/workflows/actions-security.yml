name: Actions security (zizmor)

on:
  push:
    branches: [main]
    paths: [".github/workflows/**"]
  pull_request:
    paths: [".github/workflows/**"]

permissions: read-all

jobs:
  zizmor:
    name: zizmor static analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # zizmor audits GitHub Actions workflows for security issues.
      # pipx is preinstalled on ubuntu-latest runners.
      - name: Run zizmor
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: pipx run zizmor --format sarif . > results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.5
        with:
          sarif_file: results.sarif
          category: zizmor
