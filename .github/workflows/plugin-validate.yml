name: Validate plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  validate:
    name: Structure & hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Manifests are valid JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('hooks/hooks.json','utf8'))"

      - name: Hooks pass a syntax check
        run: for f in hooks/*.mjs; do node --check "$f"; done

      - name: Skills and agents have required frontmatter
        run: |
          set -e
          for f in skills/*/SKILL.md; do grep -q "description:" "$f" || { echo "Missing description in $f"; exit 1; }; done
          for f in agents/*.md; do grep -q "^model:" "$f" || { echo "Missing model in $f"; exit 1; }; done
          echo "frontmatter OK"

      - name: Hooks behave (block dangerous, allow safe)
        run: |
          set -e
          printf '{"tool_input":{"command":"rm -rf /tmp/x"}}' | node hooks/guard-bash.mjs | grep -q '"permissionDecision":"deny"'
          out=$(printf '{"tool_input":{"command":"git diff"}}' | node hooks/guard-bash.mjs); test -z "$out"
          printf '{"tool_input":{"file_path":".env"}}' | node hooks/guard-sensitive-read.mjs | grep -q '"permissionDecision":"deny"'
          echo "hooks OK"

      - name: Hygiene — no company/email identifiers
        run: |
          if grep -rniE 'grp''otencial|global[.]inovacao|grupo[[:space:]]potencial' --exclude-dir=.git --exclude='plugin-validate.yml' .; then
            echo "::error::Forbidden identifier found (company/email). This repo must stay clean."
            exit 1
          fi
          echo "hygiene OK"
